name: Deploy CKAN Export Job (Reusable)

on:
  workflow_call:
    inputs:
      gcp_project: { required: true, type: string }
      gcp_region: { required: true, type: string }
      deployment_name: { required: true, type: string }
      cron_schedule: { required: true, type: string }
      image_url: { required: true, type: string }
      tf_state_bucket: { required: true, type: string }
      container_env_vars: { required: true, type: string }
    secrets:
      gcp_credentials: { required: true }

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      
    steps:
      - name: Checkout Pipeline Repository
        uses: actions/checkout@v4
        with:
          repository: IDEMSInternational/parenttext-pipeline
          path: pipeline-repo

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_credentials }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Initialize OpenTofu
        working-directory: pipeline-repo/tools/ckan-export/tofu
        run: |
          tofu init \
            -backend-config="bucket=${{ inputs.tf_state_bucket }}" \
            -backend-config="prefix=ckan-export/${{ inputs.deployment_name }}"

      - name: Apply OpenTofu Configuration
        working-directory: pipeline-repo/tools/ckan-export/tofu
        env:
          TF_VAR_project_id: ${{ inputs.gcp_project }}
          TF_VAR_region: ${{ inputs.gcp_region }}
          TF_VAR_deployment_name: ${{ inputs.deployment_name }}
          TF_VAR_cron_schedule: ${{ inputs.cron_schedule }}
          TF_VAR_image_url: ${{ inputs.image_url }}
          TF_VAR_container_env_vars: ${{ inputs.container_env_vars }}
        run: tofu apply -auto-approve